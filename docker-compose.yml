version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  app:
    image: ${IMAGE}
    container_name: nodejs-shopping-app
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      MONGODB_URI: "mongodb://mongo:27017/shop"
    depends_on:
      - mongo
    restart: always

volumes:
  mongo-data:
