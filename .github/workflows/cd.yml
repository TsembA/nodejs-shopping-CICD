name: CD - Terraform Deploy

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: us-west-1

jobs:
  terraform:
    name: Deploy Infrastructure & App
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-1
          role-session-name: gha-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -lock-timeout=1m \
            -var-file=env/prod.tfvars \
            -var="docker_image=ghcr.io/tsemba/nodejs-shopping-cicd/nodejs-shopping:${GITHUB_SHA}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Deploy via SSM Document
        shell: bash
        env:
          IMAGE: ghcr.io/tsemba/nodejs-shopping-cicd/nodejs-shopping:${{ github.sha }}
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --document-name "NodejsShopping-DockerDeploy-v1" \
            --targets "Key=tag:Project,Values=nodejs-shopping" \
            --parameters "Image=${IMAGE}" \
            --timeout-seconds 600 \
            --max-concurrency "1" \
            --max-errors "0" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}"

          STATUS=$(aws ssm list-command-invocations \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --query "CommandInvocations[0].Status" \
            --output text)

          echo "SSM command status: ${STATUS}"

          if [ "${STATUS}" != "Success" ]; then
            echo "SSM deployment failed"
            exit 1
          fi
